<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="author" content="CheesyMoeez">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Map - Campus Tour 360</title>
    <link rel="stylesheet" href="css/campus-map.css" />
  </head>

  <body>
    <header class="glass">
      <div class="header-content">
        <a href="menu.html" class="btn-back">
          <svg
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M19 12H5M12 19l-7-7 7-7" />
          </svg>
        </a>
        <div class="location-info">
          <h1 id="location-title">Campus Tour 360</h1>
        </div>
        <div class="header-actions"></div>
      </div>
    </header>
    <div class="center-container">
      <div class="map-container">
        <button
          class="outdoor-location-button-1 outdoor-location-button"
          onclick="location.href = 'map-tour?id=1'"
        >
          1
        </button>
        <button
          class="outdoor-location-button-2 outdoor-location-button"
          onclick="location.href = 'map-tour?id=2'"
        >
          2
        </button>
        <button
          class="outdoor-location-button-3 outdoor-location-button"
          onclick="location.href = 'map-tour?id=3'"
        >
          3
        </button>
        <button
          class="outdoor-location-button-4 outdoor-location-button"
          onclick="location.href = 'map-tour?id=4'"
        >
          4
        </button>
        <button
          class="outdoor-location-button-5 outdoor-location-button"
          onclick="location.href = 'map-tour?id=5'"
        >
          5
        </button>
        <button
          class="outdoor-location-button-6 outdoor-location-button"
          onclick="location.href = 'map-tour?id=6'"
        >
          6
        </button>
        <button
          class="outdoor-location-button-7 outdoor-location-button"
          onclick="location.href = 'map-tour?id=7'"
        >
          7
        </button>
        <button
          class="outdoor-location-button-8 outdoor-location-button"
          onclick="location.href = 'map-tour?id=8'"
        >
          8
        </button>
        <button
          class="outdoor-location-button-9 outdoor-location-button"
          onclick="location.href = 'map-tour?id=9'"
        >
          9
        </button>
        <button
          class="outdoor-location-button-10 outdoor-location-button"
          onclick="location.href = 'map-tour?id=10'"
        >
          10
        </button>
        <button
          class="outdoor-location-button-11 outdoor-location-button"
          onclick="location.href = 'map-tour?id=11'"
        >
          11
        </button>
        <button
          class="outdoor-location-button-12 outdoor-location-button"
          onclick="location.href = 'map-tour?id=12'"
        >
          12
        </button>
        <button
          class="outdoor-location-button-13 outdoor-location-button"
          onclick="location.href = 'map-tour?id=13'"
        >
          13
        </button>
        <button
          class="indoor-location-button"
          onclick="window.location.href = './menu.html'"
          onmouseout="this.innerText = 'Indoors'"
          onmouseover="
            this.innerText = 'To view the inside, use Search or Free Look'
          "
        >
          Indoors
        </button>
        <img
          class="campus-map"
          src="images/campus-map/campus-map.png"
          alt="Campus Map"
        />
      </div>
    </div>
  </body>
</html>
